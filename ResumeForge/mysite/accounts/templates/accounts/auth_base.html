{% extends "base.html" %}
{% block extra_head %}
<style>
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:90px 1rem 2rem;}
.auth-card{background:var(--card-bg);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:24px;padding:2.5rem 2rem;width:100%;max-width:460px;box-shadow:var(--shadow-md);}
.auth-header{text-align:center;margin-bottom:2rem;}
.auth-header .icon-wrap{width:60px;height:60px;background:linear-gradient(135deg,var(--green),var(--green-light));border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:1.5rem;color:white;box-shadow:0 6px 20px var(--green-glow);}
.auth-header h1{font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--green-dark);margin-bottom:0.4rem;}
.auth-header p{color:var(--gray);font-size:0.9rem;}
.form-group{margin-bottom:1.2rem;}
.form-label{display:block;font-size:0.85rem;font-weight:600;color:var(--text);margin-bottom:0.45rem;}
.form-input{width:100%;padding:0.75rem 1rem;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:inherit;font-size:0.92rem;background:white;color:var(--text);transition:border-color 0.2s,box-shadow 0.2s;outline:none;}
.form-input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(22,163,74,0.12);}
.form-input.error{border-color:#ef4444;}
.field-error{color:#ef4444;font-size:0.78rem;margin-top:0.3rem;display:flex;align-items:center;gap:0.3rem;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.btn-full{width:100%;justify-content:center;padding:0.8rem;font-size:0.95rem;border-radius:var(--radius-sm);margin-top:0.5rem;}
.divider{display:flex;align-items:center;gap:1rem;margin:1.4rem 0;color:var(--gray);font-size:0.82rem;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.social-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:0.7rem;padding:0.7rem;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:white;font-family:inherit;font-size:0.9rem;font-weight:500;cursor:pointer;transition:all 0.2s;color:var(--text);text-decoration:none;}
.social-btn:hover{border-color:var(--green);box-shadow:0 2px 12px var(--green-glow);}
.social-btn img{width:20px;height:20px;}
.auth-footer{text-align:center;margin-top:1.5rem;font-size:0.88rem;color:var(--gray);}
.auth-footer a{color:var(--green);text-decoration:none;font-weight:600;}
.auth-footer a:hover{text-decoration:underline;}
.check-row{display:flex;align-items:center;gap:0.6rem;margin-top:0.3rem;}
.check-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--green);}
.check-row label{font-size:0.88rem;color:var(--gray);}
.otp-input{letter-spacing:0.4rem;font-size:1.4rem;font-weight:700;text-align:center;}
.otp-hint{font-size:0.82rem;color:var(--gray);text-align:center;margin-top:0.5rem;}
.non-field-errors{background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;padding:0.7rem 1rem;margin-bottom:1rem;font-size:0.85rem;color:#991b1b;}
</style>
{% endblock %}
